name: Golden Path Smoke

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick golden-path smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quick smoke harness
        run: ./scripts/run_golden_path_smoke.sh

  video-date:
    name: Video-date golden-path smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect video-date changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          if ! changed_files="$(git diff --name-only "$base_sha" "$head_sha" 2>/dev/null)"; then
            echo "Could not diff PR base/head directly; running video-date smoke conservatively."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          printf '%s\n' "$changed_files"

          video_date_pattern='^(\.github/workflows/golden-path-smoke\.yml|scripts/run_golden_path_smoke\.sh|docs/video-date-hardening-closure-handoff\.md|src/pages/VideoDate\.tsx|src/components/video-date/|src/components/lobby/|apps/mobile/app/date/|apps/mobile/components/lobby/|shared/matching/|shared/observability/|supabase/functions/admin-video-date-ops/|supabase/functions/_shared/admin-video-date-ops)'

          if printf '%s\n' "$changed_files" | grep -E -q "$video_date_pattern"; then
            echo "Video-date relevant changes detected."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No video-date relevant changes detected; skipping expensive video-date smoke."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.should_run == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install root dependencies
        if: steps.filter.outputs.should_run == 'true'
        run: npm ci

      - name: Install mobile dependencies
        if: steps.filter.outputs.should_run == 'true'
        working-directory: apps/mobile
        run: npm ci

      - name: Run video-date smoke harness
        if: steps.filter.outputs.should_run == 'true'
        run: ./scripts/run_golden_path_smoke.sh --video-date
