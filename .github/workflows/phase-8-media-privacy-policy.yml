name: Phase 8 Media Privacy Policy

on:
  pull_request:
    paths:
      - '.github/workflows/phase-8-media-privacy-policy.yml'
      - 'apps/mobile/**'
      - 'docs/media-phase8-closure.md'
      - 'package-lock.json'
      - 'package.json'
      - 'shared/chat/**'
      - 'shared/media-sdk/storage-presign-policy.ts'
      - 'shared/mediaPhase8Contracts.test.ts'
      - 'src/**'
      - 'supabase/functions/get-chat-media-url/**'
      - 'supabase/functions/chat-thread-page/**'
      - 'supabase/functions/_shared/bunny-stream-tokens.ts'
      - 'supabase/functions/upload-image/**'
      - 'supabase/functions/upload-voice/**'
      - 'supabase/functions/upload-event-cover/**'
      - 'supabase/migrations/**'
      - 'supabase/validation/media_phase8_profile_vibe_signing.sql'
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase-8-media-privacy-policy.yml'
      - 'apps/mobile/**'
      - 'docs/media-phase8-closure.md'
      - 'package-lock.json'
      - 'package.json'
      - 'shared/chat/**'
      - 'shared/media-sdk/storage-presign-policy.ts'
      - 'shared/mediaPhase8Contracts.test.ts'
      - 'src/**'
      - 'supabase/functions/get-chat-media-url/**'
      - 'supabase/functions/chat-thread-page/**'
      - 'supabase/functions/_shared/bunny-stream-tokens.ts'
      - 'supabase/functions/upload-image/**'
      - 'supabase/functions/upload-voice/**'
      - 'supabase/functions/upload-event-cover/**'
      - 'supabase/migrations/**'
      - 'supabase/validation/media_phase8_profile_vibe_signing.sql'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  media-phase8:
    name: Phase 8 privacy and media contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Phase 8 media privacy contracts
        run: npm run test:media-phase8
