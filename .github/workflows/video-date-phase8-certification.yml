name: Video Date Phase 8 Certification

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Certification scope to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - two-user-web
          - rls
          - chaos
          - load
          - validation
  schedule:
    - cron: "37 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  certify:
    name: Nightly/manual staging certification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Phase 8 certification
        env:
          PHASE8_COMMIT_SHA: ${{ github.sha }}
          PHASE8_STAGING_BASE_URL: ${{ secrets.PHASE8_STAGING_BASE_URL }}
          PHASE8_STAGING_SUPABASE_URL: ${{ secrets.PHASE8_STAGING_SUPABASE_URL }}
          PHASE8_STAGING_SUPABASE_ANON_KEY: ${{ secrets.PHASE8_STAGING_SUPABASE_ANON_KEY }}
          PHASE8_STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PHASE8_STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          PHASE8_STAGING_DB_URL: ${{ secrets.PHASE8_STAGING_DB_URL }}
          PHASE8_STAGING_CRON_SECRET: ${{ secrets.PHASE8_STAGING_CRON_SECRET }}
          PHASE8_E2E_EVENT_ID: ${{ secrets.PHASE8_E2E_EVENT_ID }}
          PHASE8_E2E_USER_A_STATE_JSON: ${{ secrets.PHASE8_E2E_USER_A_STATE_JSON }}
          PHASE8_E2E_USER_B_STATE_JSON: ${{ secrets.PHASE8_E2E_USER_B_STATE_JSON }}
          PHASE8_RLS_SESSION_ID: ${{ secrets.PHASE8_RLS_SESSION_ID }}
          PHASE8_RLS_PARTICIPANT_JWT: ${{ secrets.PHASE8_RLS_PARTICIPANT_JWT }}
          PHASE8_RLS_NON_PARTICIPANT_JWT: ${{ secrets.PHASE8_RLS_NON_PARTICIPANT_JWT }}
          PHASE8_SNAPSHOT_SESSION_ID: ${{ secrets.PHASE8_SNAPSHOT_SESSION_ID }}
          PHASE8_PARTICIPANT_JWT: ${{ secrets.PHASE8_PARTICIPANT_JWT }}
        run: npx tsx scripts/phase8-live-certification.ts --mode "${{ github.event.inputs.mode || 'all' }}"
